name: ContentOS Auto Publish

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger schedule-posts
        run: |
          curl -X POST https://wxrqwdahzpauqwnytiwx.supabase.co/functions/v1/schedule-posts \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json" \
          --max-time 55 \
          --silent
